# Server Configuration
server.port=8081

# Database Configuration
# TODO: SECURITY - Externalize credentials using environment variables for production!
# TODO: Use SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/pokerdb
spring.datasource.username=poker
spring.datasource.password=pokerpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.outOfOrder=true
spring.flyway.validateOnMigrate=false
spring.flyway.placeholderReplacement=false

# Logging
logging.level.poker.server=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
