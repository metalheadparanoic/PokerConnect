services:
  db:
    image: postgres:15
    container_name: poker_postgres
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: pokerpass
      POSTGRES_DB: pokerdb
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
